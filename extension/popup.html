<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --green: #1a7f37;
      --green-dim: #dafbe1;
      --red: #cf222e;
      --red-dim: #ffebe9;
      --blue: #0969da;
    }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      width: 320px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      user-select: none;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin: 0 0 10px;
      color: var(--muted);
    }

    /* hero status card */
    #hero {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      background: var(--card);
      transition: background 0.25s, border-color 0.25s;
    }
    #hero.on { background: var(--green-dim); border-color: #4ac26b; }
    #hero.err { background: var(--red-dim); border-color: #ff8182; }
    #heroState {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #heroState .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    #hero.on #heroState .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
    #hero.err #heroState .dot { background: var(--red); }
    #heroIp {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 15px;
    }
    #heroIp b { color: var(--text); font-weight: 600; }

    .section {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: var(--card);
    }
    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .row { display: flex; gap: 8px; align-items: center; }

    select, input, textarea {
      box-sizing: border-box;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      width: 100%;
    }
    select { flex: 1; cursor: pointer; }
    textarea { height: 64px; resize: vertical; margin-top: 8px; user-select: text; }

    button {
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      padding: 8px 14px;
      background: #1f883d;
      color: #fff;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    button:disabled { opacity: 0.55; cursor: default; }
    button.stop { background: #cf222e; }
    button.ghost {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      width: 100%;
      margin-top: 8px;
      padding: 6px;
    }
    button.ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

    .spinner {
      width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .busy .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; min-height: 14px; }
    .hint b { color: var(--text); }

    /* segmented mode control */
    .modes {
      display: flex;
      gap: 3px;
      background: #eff2f5;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .modes button {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      color: var(--muted);
    }
    .modes button.active {
      background: #fff;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.15);
    }
    #sitesWrap { display: none; }
    #sitesWrap.visible { display: block; }

    /* main switch */
    .switchRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: var(--card);
    }
    .switchTitle { font-size: 14px; font-weight: 600; }
    .switchSub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .switch { position: relative; width: 44px; height: 25px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 25px;
      transition: 0.2s;
      cursor: pointer;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 19px; height: 19px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
      box-shadow: 0 1px 3px rgba(31, 35, 40, 0.35);
    }
    .switch input:checked + .slider { background: var(--green); }
    .switch input:checked + .slider:before { transform: translateX(19px); }
    .switch input:disabled + .slider { opacity: 0.5; cursor: default; }

    details { margin-top: 2px; }
    summary {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      outline: none;
      padding: 2px 0;
    }
    details .row { margin-top: 8px; }
    details label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }
    .host { flex: 2; } .port { flex: 1; }
  </style>
</head>
<body>
  <h1>OPENVPN BRIDGE</h1>

  <div id="hero">
    <div id="heroState"><span class="dot"></span><span id="heroText">Checking…</span></div>
    <div id="heroIp"></div>
  </div>

  <div class="section">
    <div class="label">VPN tunnel</div>
    <div class="row">
      <select id="profileSel"></select>
      <button id="bridgeBtn" disabled><span class="spinner"></span><span id="bridgeBtnText">Start</span></button>
    </div>
    <div class="hint" id="bridgeStatus">Checking bridge…</div>
  </div>

  <div class="section">
    <div class="label">Routing</div>
    <div class="modes">
      <button id="modeAll" type="button">All traffic</button>
      <button id="modeSites" type="button">Only these sites</button>
    </div>
    <div id="sitesWrap">
      <textarea id="sites" placeholder="example.com&#10;blocked-site.net" spellcheck="false"></textarea>
      <button id="addSite" class="ghost" type="button">+ Add current site</button>
    </div>
  </div>

  <div class="switchRow">
    <div>
      <div class="switchTitle">Route Chrome via VPN</div>
      <div class="switchSub" id="switchSub">All Chrome traffic</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <details>
    <summary>Advanced</summary>
    <div class="row">
      <div class="host">
        <label for="host">Proxy host</label>
        <input id="host" value="127.0.0.1" />
      </div>
      <div class="port">
        <label for="port">Port</label>
        <input id="port" value="1080" type="number" />
      </div>
    </div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
